name: CI

on:
  push:
    branches: [main, development]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret scan (committed source)
        run: |
          # Application source only — tests/scripts/supabase carry known demo fixtures.
          if grep -rInE "(password|secret|token|api_key|apikey|aws_secret)[[:space:]]*[:=][[:space:]]*['\"][^'\"]{8,}" \
               --include='*.js' --include='*.ts' --include='*.tsx' \
               --exclude='*.test.*' --exclude='*.spec.*' \
               --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.next \
               --exclude-dir=tests --exclude-dir=scripts --exclude-dir=supabase src ; then
            echo "::error::Possible hardcoded secret found in src/"; exit 1
          fi
          echo "No obvious secrets found."

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --legacy-peer-deps
      - run: npm run lint
      - run: npm run typecheck
      - run: npx vitest run
      - run: npm run build

  migrations:
    name: migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Spins up the local Postgres stack (Docker) and applies the full,
      # forward-only migration chain — the same validation as `supabase db
      # reset` locally. Fails the build if any migration is broken.
      - run: supabase db start
      - run: supabase db reset
